<h1>Online Store</h1>

<div class="categories">
  <button
    *ngFor="let c of categories"
    (click)="selectCategory(c.id)"
    [class.active]="c.id === selectedCategoryId">
    {{ c.name }}
  </button>
</div>

<p *ngIf="selectedCategoryId === null">
  Выберите категорию
</p>

<app-product-list
  *ngIf="selectedCategoryId !== null"
  [products]="selectedProducts"
  (remove)="removeProduct($event)">
</app-product-list>
