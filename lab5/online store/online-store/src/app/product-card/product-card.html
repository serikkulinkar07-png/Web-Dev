<div class="card">
  <img [src]="product.image" [alt]="product.name" />

  <h3>{{ product.name }}</h3>
  <p class="desc">{{ product.description }}</p>

  <div class="price">{{ product.price }} ₸</div>
  <div class="rating">⭐ {{ product.rating }} / 5</div>

  <div class="actions">
    <button class="btn btn-like" (click)="like()">❤️ Like ({{ product.likes }})</button>

    <a class="link" [href]="product.link" target="_blank">
      <button class="btn btn-open" type="button">Open on Kaspi</button>
    </a>

    <button class="btn btn-delete" (click)="delete()">🗑 Delete</button>
  </div>

  <div class="share">
    <button class="btn btn-share" (click)="shareWhatsApp()">WhatsApp</button>
    <button class="btn btn-share" (click)="shareTelegram()">Telegram</button>
  </div>
</div>
